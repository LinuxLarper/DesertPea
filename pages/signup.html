<!DOCTYPE html>
<html>
<head>
<title> Login to Desert Pea </title>
<link rel="stylesheet" type="text/css" href="../static/styles.css">
</head>
<body>
<div class="topnav">
    <a href="../index.html">Home</a>
    <a class="active" href="login.html">Login</a>
    <a href="page.html">pages</a>
    <a href="UserInfo.html" style="align-self: right;"> User </a>
</div>
<div class="heading"> 
<h1 id="heading" style="text-align: center; margin-right: 10px" name="heading"> Please enter your new accounts details </h1>
</div>

<div class="CircleText" style="height: 50vw; background-color: rgb(255, 168, 109); border-radius: 80px ; text-align: left;"> 
    <div style="align-self: left; margin-top: 10px;" class="loginbox">
        <input class="CircleText inputclass" placeholder="Username" id="Username"> </input>
    </div>

    <div style="margin-top: 10px; align-self: left;" class="loginbox">
        <input class="CircleText inputclass" id="passwordBox" input type="password" placeholder="Password" name="Password"> </input>
        <button class="CircleText inputclass" type="button" onclick="ShowPassword()"> show Password </button>
        <button class="CircleText inputclass" type="button" onclick="FetchUserSignup()"> Signup </button>
    </div>
    <div class="CircleText inputclass"> Login instead? </div>
    <div style="margin-top: 3vw;">
        <a class="CircleText inputclass"  href="login.html"> Login here</a>
    </div>
</div>

<script>
    function ShowPassword() {
        var element = document.getElementById("passwordBox");
        if (element.type === "password") {
            element.type = "text"
        } else {
            element.type = "password";
        }
    }

    async function FetchUserSignup() {
        console.log("Fetching...")
        var HeaderElement = document.getElementById("heading");
        var Username = document.getElementById("Username").value;
        console.log(Password)
        var Password = document.getElementById("passwordBox").value;
        console.log(Username)
        var SignupValues = {
            User: Username,
            Password: Password
        };
        console.log("Signup")
        console.log(SignupValues)
        const res = await fetch('/api/signup', {
            method: "POST",
            headers: {
                "Content-type":"application/json"
            },
            body:JSON.stringify(SignupValues)
        });
        res.text().then(async txt => {
            HeaderElement.innerText = txt;
            const date = new Date();
            date.setTime(date.getTime() + (30 * 24 * 60 * 60 * 1000));
            let expires = "; expires=" + date.toUTCString();  
            let idNumber = Math.random(0,1000000000)
            console.log(idNumber);

            //hash and make cookie
            const res = await fetch('/api/hash', {
                method: "POST",
                headers: {
                    "Content-type":"application/json"
                },
                body:JSON.stringify({
                    id: idNumber,
                    user: Username
                })
            })
            res.text().then(txt => {
                console.log("fetch finished, returning value")
                console.log(txt)
                document.cookie = `user=${txt}` + expires + '; path=/' 
            })
        })
    }
</script>




</body>
</html>
